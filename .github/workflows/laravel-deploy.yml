name: Laravel Deploy
on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: "${{ secrets.DOCKER_USER }}/abrahamaja-simple-social-media"

jobs:
  run-mysql-in-docker:
    runs-on: self-hosted
    steps:
      - name: Cleanup before mysql
        run: docker system prune -a -f --volumes

      - name: Delete old container
        run: docker rm -f $(docker ps -a | grep 'mysql' | awk '{print $1}') || true

      - name: Run mysql
        run: docker run -d --name mysql -e MYSQL_ROOT_PASSWORD=password -e MYSQL_DATABASE=social_media -p 3306:3306 mysql:5.7

  build-push-image:
    needs: run-mysql-in-docker
    runs-on: self-hosted
    steps:
      - name: Cleanup before build
        run: docker system prune -a -f --volumes

      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug image name
        run: echo $IMAGE_NAME

      - name: Build image
        run: docker build -t $IMAGE_NAME .

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Push image
        run: docker push $IMAGE_NAME

  deploy-social-media:
    needs: build-push-image
    runs-on: self-hosted
    steps:
      - name: Cleanup before deploy
        run: docker system prune -a -f --volumes

      - name: Checkout
        uses: actions/checkout@v4

      - name: Stop container
        run: docker compose down --rmi all || true

      - name: Run container
        run: docker compose up -d

